<svg width="220" height="48" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- Outer dashed ring: hidden agent identity -->
  <circle cx="24" cy="24" r="15"
    stroke="white" stroke-opacity="0.35"
    stroke-width="1.5" stroke-dasharray="3 2.5"
    fill="none"/>

  <!-- Inner fill: the proof space -->
  <circle cx="24" cy="24" r="9" fill="white" fill-opacity="0.12"/>

  <!-- Checkmark: verified without revealing -->
  <path d="M19 24l3.5 3.5 6.5-6.5"
    stroke="white" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: ZKX -->
  <text x="64" y="20"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="800" fill="white"
    letter-spacing="-0.5">ZKX</text>

  <!-- Tagline: KNOW YOUR AGENT -->
  <text x="65" y="36"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="9" font-weight="500" fill="#64748b"
    letter-spacing="2.5">KNOW YOUR AGENT</text>
</svg>
